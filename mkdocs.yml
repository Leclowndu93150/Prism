site_name: Prism
site_description: Multi-version, multi-loader Minecraft mod development.
site_url: https://leclowndu93150.github.io/Prism/
repo_url: https://github.com/Leclowndu93150/Prism
repo_name: Leclowndu93150/Prism

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration:
    - Project Structure: configuration/project-structure.md
    - Loaders: configuration/loaders.md
    - Metadata: configuration/metadata.md
    - Mappings: configuration/mappings.md
    - Dependencies: configuration/dependencies.md
  - Publishing: publishing.md
  - CI/CD: ci.md
  - Reference:
    - DSL Reference: reference/dsl.md
    - Template Variables: reference/template-variables.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
